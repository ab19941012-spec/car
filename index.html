<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7589公務車系統 | Emerald Edition</title>
    
    <!-- 載入像素風字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --pk-bg-grass: #80c0a0; 
            --pk-dark-green: #388060;
            --pk-ui-border: #424242;
            --pk-window-bg: #f8f8f8;
            --pk-name-tag: #ff5050;
        }

        /* 核心設定：確保所有像素元素銳利不模糊 */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            image-rendering: pixelated; 
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #1a1a1a;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* 外部掌機外殼 */
        .handheld-view {
            width: 100%;
            max-width: 480px;
            background-color: var(--pk-bg-grass);
            background-image: radial-gradient(#60a888 15%, transparent 16%),
                              radial-gradient(#60a888 15%, transparent 16%);
            background-size: 32px 32px;
            background-position: 0 0, 16px 16px;
            border: 8px solid #000;
            position: relative;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        /* 標題區 */
        .system-header {
            margin: 15px;
            background: var(--pk-window-bg);
            border: 5px double var(--pk-ui-border);
            padding: 12px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
            position: relative;
        }

        .system-header h1 {
            font-size: 20px;
            color: var(--pk-dark-green);
            margin-bottom: 8px;
            font-weight: 900;
        }

        .system-header p {
            font-size: 12px;
            color: #666;
            font-weight: bold;
        }

        /* 像素小車動畫區 */
        .pixel-car-container {
            padding: 0 20px;
            display: flex;
            align-items: flex-end;
            margin-bottom: 5px;
        }
        .pixel-car {
            font-size: 32px;
            animation: drive 1s steps(2) infinite;
            display: inline-block;
        }
        @keyframes drive {
            from { transform: translateY(0); }
            to { transform: translateY(-3px); }
        }

        /* 車牌板 */
        .info-panel {
            margin: 0 15px 15px;
            background: linear-gradient(135deg, #78b098 0%, #30A048 100%);
            border: 4px solid #000;
            border-radius: 4px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            box-shadow: inset -4px -4px 0 rgba(0,0,0,0.2);
        }
        .plate-no { 
            font-family: 'Press Start 2P', cursive;
            font-size: 18px; 
            text-shadow: 2px 2px #000;
        }
        .company-name { font-size: 11px; text-align: right; font-weight: bold; line-height: 1.4; }

        /* 提示對話框 */
        .bless-box {
            margin: 0 15px 15px;
            background: #fff;
            border: 3px solid var(--pk-ui-border);
            border-radius: 8px;
            padding: 12px;
            position: relative;
        }
        .bless-box p { font-size: 14px; font-weight: bold; line-height: 1.6; }
        
        .arrow {
            position: absolute; bottom: 8px; right: 12px;
            width: 0; height: 0;
            border-left: 8px solid transparent; border-right: 6px solid transparent;
            border-top: 10px solid var(--pk-dark-green);
            animation: bounce 0.6s steps(2) infinite;
        }

        /* PC 日曆區塊 */
        .pc-calendar {
            background: #fff;
            margin: 0 15px 20px;
            border: 4px solid var(--pk-ui-border);
            padding: 6px;
        }

        .calendar-nav {
            display: flex; justify-content: space-between; 
            background: var(--pk-dark-green); padding: 5px; margin-bottom: 5px;
        }
        .calendar-nav select {
            border: 2px solid #000; font-weight: bold; padding: 2px; background: #eee;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background-color: #ddd; /* 這裡改為淺灰色，讓格子線條不那麼突兀 */
            gap: 1px;
            border: 2px solid #000;
        }

        .grid-h { background: #fdfdfd; font-size: 11px; font-weight: bold; padding: 6px 0; text-align: center; color: #888; }
        
        .grid-day {
            background: #fff;
            min-height: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px 2px;
            cursor: pointer;
            overflow: hidden;
        }
        .grid-day.booked { background: #e8fce0; }
        /* 修正：沒有日期的格子背景色改為淺灰而非黑色 */
        .grid-day.empty { background: #eee; pointer-events: none; }

        .date-val { 
            font-family: 'Press Start 2P', cursive; 
            font-size: 12px; margin-bottom: 5px; color: #222; 
        }
        
        .user-chip {
            width: 96%;
            background-color: var(--pk-name-tag);
            color: #fff;
            font-size: 11px;
            padding: 3px 2px;
            text-align: center;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
            margin-top: auto;
            white-space: normal;
            word-break: break-all;
            line-height: 1.1;
        }

        /* 動作選單 */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 99;
        }
        .dialog-card {
            background: #fff; border: 6px double var(--pk-ui-border); 
            padding: 20px; width: 85%; max-width: 320px;
            box-shadow: 0 0 0 4px #fff;
        }
        .dialog-card h3 { 
            margin-bottom: 12px; font-size: 18px; color: var(--pk-dark-green);
            border-bottom: 2px solid #eee; padding-bottom: 5px;
        }
        .pk-input {
            width: 100%; padding: 12px; border: 3px solid #000; font-size: 16px; 
            outline: none; margin-bottom: 15px; background: #eee;
        }
        .btn-pk {
            width: 100%; padding: 12px; border: 3px solid #000; font-size: 16px; font-weight: bold; cursor: pointer;
            margin-top: 8px; text-align: left; position: relative; padding-left: 25px;
            background: #fff;
        }
        .btn-pk::before { 
            content: "▶"; position: absolute; left: 8px; 
            color: var(--pk-dark-green);
            animation: blink 0.5s steps(2) infinite;
        }
        .btn-yes { background: var(--pk-bg-glass); }
        .btn-del { background: #ffaaaa; }

        #sync-status {
            position: fixed; top: 10px; right: 10px; background: var(--pk-dark-green); color: white;
            padding: 4px 10px; border-radius: 4px; font-size: 10px; font-family: 'Press Start 2P', cursive;
            display: none; z-index: 1000; border: 2px solid white;
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes blink { 0% { opacity: 0; } 100% { opacity: 1; } }

    </style>
</head>
<body>

    <div id="sync-status">SYNCING...</div>

    <div class="handheld-view">
        <header class="system-header">
            <h1>公務車借用系統</h1>
            <p>案號：C115-A04 · 部落工程輔導</p>
        </header>

        <div class="pixel-car-container">
            <span class="pixel-car">🚗</span>
            <span style="font-size: 10px; font-weight: bold; margin-left: 10px; color: #1c3329;">安全行駛中...</span>
        </div>

        <div class="info-panel">
            <div class="plate-no">AUA-7589</div>
            <div class="company-name">
                邑菖工程顧問<br>有限公司
            </div>
        </div>

        <div class="bless-box">
            <p>加油！辛苦的一天。🚀<br>別忘了也幫車子加油。⛽</p>
            <div class="arrow"></div>
        </div>

        <div class="pc-calendar">
            <div class="calendar-nav">
                <select id="ySel" onchange="render()"></select>
                <select id="mSel" onchange="render()"></select>
            </div>
            <div class="calendar-grid" id="mainGrid"></div>
        </div>
        
        <p style="text-align:center; padding-bottom: 20px; font-size: 11px; color: #1c3329; font-weight: bold; text-shadow: 1px 1px 0 #fff;">
            ( 點擊日期格子進行即時登記 )
        </p>
    </div>

    <div class="modal" id="modalLayer" onclick="hideModal()">
        <div class="dialog-card" id="addWindow" onclick="event.stopPropagation()">
            <h3>登記預約</h3>
            <p style="font-size: 14px; margin-bottom:10px; font-weight: bold;">請留下您的大名：</p>
            <input type="text" id="nameIn" class="pk-input" spellcheck="false" placeholder="例如：沈大帥">
            <button class="btn-pk btn-yes" onclick="save()">[ 確認 ] 我想預約</button>
            <button class="btn-pk" onclick="hideModal()">[ 放棄 ] 離開</button>
        </div>

        <div class="dialog-card" id="delWindow" onclick="event.stopPropagation()" style="display:none;">
            <h3>取消登記紀錄？</h3>
            <p style="font-size: 14px; margin-bottom:10px; font-weight: bold;" id="currentInfo"></p>
            <input type="password" id="delPw" class="pk-input" placeholder="管理員密碼">
            <button class="btn-pk btn-del" onclick="handleDel()">[ 強制 ] 刪除此紀錄</button>
            <button class="btn-pk" onclick="hideModal()">[ 關閉 ] 返回系統</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://carsystem-fe963-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const grid = document.getElementById('mainGrid');
        const layer = document.getElementById('modalLayer');
        const ySel = document.getElementById('ySel');
        const mSel = document.getElementById('mSel');
        const syncStatus = document.getElementById('sync-status');
        
        let db = {};
        let activeKey = "";

        database.ref('bookings').on('value', (snapshot) => {
            db = snapshot.val() || {};
            render();
            syncStatus.style.display = 'block';
            setTimeout(() => { syncStatus.style.display = 'none'; }, 1500);
        });

        function init() {
            const now = new Date();
            for(let i=2024; i<=2030; i++) ySel.add(new Option(`${i} 年`, i));
            for(let i=0; i<12; i++) mSel.add(new Option(`${i+1} 月`, i));
            ySel.value = now.getFullYear(); mSel.value = now.getMonth();
            render();
        }

        function render() {
            grid.innerHTML = "";
            const y = parseInt(ySel.value), m = parseInt(mSel.value);
            const first = new Date(y, m, 1).getDay();
            const days = new Date(y, m+1, 0).getDate();

            ["日", "一", "二", "三", "四", "五", "六"].forEach(day => {
                const el = document.createElement('div'); el.className = "grid-h"; el.innerText = day; grid.appendChild(el);
            });

            for(let i=0; i<first; i++) {
                const cell = document.createElement('div'); cell.className = "grid-day empty"; grid.appendChild(cell);
            }

            for(let i=1; i<=days; i++) {
                const mm = (m + 1).toString().padStart(2, '0');
                const dd = i.toString().padStart(2, '0');
                const key = `${y}-${mm}-${dd}`;
                const name = db[key];
                
                const cell = document.createElement('div');
                cell.className = `grid-day ${name ? 'booked' : ''}`;
                cell.innerHTML = `
                    <div class="date-val">${i}</div>
                    ${name ? `<div class="user-chip">${name}</div>` : ''}
                `;
                cell.onclick = () => openAction(key);
                grid.appendChild(cell);
            }
        }

        function openAction(key) {
            activeKey = key;
            layer.style.display = 'flex';
            if(db[key]) {
                document.getElementById('addWindow').style.display='none';
                document.getElementById('delWindow').style.display='block';
                document.getElementById('currentInfo').innerText = `登記人員：${db[key]}`;
                document.getElementById('delPw').value = "";
            } else {
                document.getElementById('delWindow').style.display='none';
                document.getElementById('addWindow').style.display='block';
                document.getElementById('nameIn').value = "";
            }
        }

        function hideModal() { layer.style.display = 'none'; }

        function save() {
            const val = document.getElementById('nameIn').value.trim();
            if(!val) return alert("請輸入名字！");
            database.ref('bookings/' + activeKey).set(val).then(() => hideModal());
        }

        function handleDel() {
            if(document.getElementById('delPw').value === "1234") {
                database.ref('bookings/' + activeKey).remove().then(() => hideModal());
            } else {
                alert("密碼錯誤！");
            }
        }

        init();
    </script>
</body>
</html>
